name: Bash Tests (shunit2)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bash, git, and shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y bash git shellcheck

      - name: Install shunit2
        run: |
          git submodule update --init --recursive

      - name: Make scripts executable
        run: |
          chmod +x reword_commits.sh
          chmod +x tests/test_reword_commits.sh

      - name: Run ShellCheck on scripts
        run: |
          shellcheck reword_commits.sh
          shellcheck tests/test_reword_commits.sh

      - name: Run bash tests (shunit2)
        run: |
          ./tests/test_reword_commits.sh 