name: Bash Tests (shunit2)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bash and git
        run: sudo apt-get update && sudo apt-get install -y bash git

      - name: Install shunit2
        run: |
          git submodule update --init --recursive

      - name: Make test script executable
        run: chmod +x tests/test_reword_commits.sh

      - name: Run bash tests (shunit2)
        run: |
          set -x
          ./tests/test_reword_commits.sh || (echo '=== TEST OUTPUT ===' && cat tests/test_reword_commits.sh && exit 1) 